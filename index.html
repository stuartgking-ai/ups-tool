<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="UPS Sizing">
<meta name="theme-color" content="#0f172a">
<title>UPS Battery Sizing Tool</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#f1f5f9}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}

/* Gate screen */
.gate{width:100%;max-width:400px;animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.gate-card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:36px 32px;box-shadow:0 24px 48px rgba(0,0,0,.5)}
.gate-icon{font-size:2.8rem;text-align:center;margin-bottom:12px}
.gate-title{font-size:1.3rem;font-weight:700;text-align:center;color:#f1f5f9;margin-bottom:6px}
.gate-sub{font-size:.85rem;color:#64748b;text-align:center;margin-bottom:28px;line-height:1.5}

.input-wrap{position:relative;margin-bottom:14px}
.input-wrap input{width:100%;background:#0f172a;border:1px solid #475569;border-radius:10px;padding:12px 44px 12px 14px;color:#f1f5f9;font-size:16px;transition:border-color .2s;outline:none}
.input-wrap input:focus{border-color:#38bdf8}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#64748b;cursor:pointer;font-size:1.1rem;padding:4px;line-height:1}
.eye-btn:hover{color:#94a3b8}

.unlock-btn{width:100%;padding:13px;background:linear-gradient(135deg,#0369a1,#0284c7);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;transition:all .2s;margin-top:4px}
.unlock-btn:hover{background:linear-gradient(135deg,#0284c7,#38bdf8);transform:translateY(-1px)}
.unlock-btn:active{transform:translateY(0)}
.unlock-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

.error-msg{color:#f87171;font-size:.82rem;text-align:center;margin-top:10px;min-height:20px;transition:opacity .2s}
.error-msg.hidden{opacity:0}

.spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Expired screen */
.expired-card{background:#1e293b;border:1px solid #ef4444;border-radius:16px;padding:36px 32px;box-shadow:0 24px 48px rgba(0,0,0,.5);text-align:center;max-width:420px}
.expired-icon{font-size:3rem;margin-bottom:16px}
.expired-title{font-size:1.2rem;font-weight:700;color:#f87171;margin-bottom:12px}
.expired-msg{font-size:.9rem;color:#94a3b8;line-height:1.7}
.expired-msg a{color:#38bdf8;text-decoration:none}
.expired-msg a:hover{text-decoration:underline}

/* Tool frame */
#toolFrame{display:none;position:fixed;inset:0;width:100%;height:100%;border:none;background:#0f172a}
</style>
</head>
<body>

<!-- Expired screen (shown if past expiry) -->
<div class="gate" id="expiredScreen" style="display:none">
  <div class="expired-card">
    <div class="expired-icon">⏰</div>
    <div class="expired-title">This Version Has Expired</div>
    <div class="expired-msg">
      This tool version has expired.<br><br>
      Please contact <a href="mailto:stuartgking@gmail.com">stuartgking@gmail.com</a> for the latest version.
    </div>
  </div>
</div>

<!-- Password screen (shown if not expired) -->
<div class="gate" id="passwordScreen" style="display:none">
  <div class="gate-card">
    <div class="gate-icon">🔐</div>
    <div class="gate-title">UPS Battery Sizing Tool</div>
    <div class="gate-sub">Enter your password to access the tool</div>
    <div class="input-wrap">
      <input type="password" id="pwInput" placeholder="Password" autocomplete="current-password" autocorrect="off" autocapitalize="off" spellcheck="false">
      <button class="eye-btn" onclick="togglePw()" title="Show/hide password" aria-label="Show password">👁</button>
    </div>
    <button class="unlock-btn" id="unlockBtn" onclick="unlock()">Unlock</button>
    <div class="error-msg hidden" id="errMsg">Incorrect password — please try again</div>
  </div>
</div>

<!-- Decrypted tool renders here -->
<iframe id="toolFrame" title="UPS Battery Sizing Tool"></iframe>

// ─────────────────────────────────────────────────────────────

function togglePw(){
  const inp=document.getElementById('pwInput');
  inp.type=inp.type==='password'?'text':'password';
}

// Check expiry on load
window.addEventListener('load',()=>{
  if(new Date() >= EXPIRY){
    document.getElementById('expiredScreen').style.display='flex';
  } else {
    document.getElementById('passwordScreen').style.display='flex';
    document.getElementById('pwInput').focus();
    document.getElementById('pwInput').addEventListener('keydown',e=>{if(e.key==='Enter')unlock();});
  }
});

async function unlock(){
  const btn=document.getElementById('unlockBtn');
  const err=document.getElementById('errMsg');
  const pw=document.getElementById('pwInput').value;
  if(!pw)return;

  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span>Decrypting…';
  err.classList.add('hidden');

  try{
    const raw=Uint8Array.from(atob(PAYLOAD),c=>c.charCodeAt(0));
    // Layout: [16 salt][12 iv][16 tag][...ciphertext]
    const salt=raw.slice(0,16);
    const iv=raw.slice(16,28);
    const tag=raw.slice(28,44);
    const ciphertext=raw.slice(44);
    // Re-combine ciphertext+tag as SubtleCrypto expects tag appended
    const ctWithTag=new Uint8Array(ciphertext.length+16);
    ctWithTag.set(ciphertext);ctWithTag.set(tag,ciphertext.length);

    const enc=new TextEncoder();
    const keyMaterial=await crypto.subtle.importKey('raw',enc.encode(pw),{name:'PBKDF2'},false,['deriveKey']);
    const key=await crypto.subtle.deriveKey(
      {name:'PBKDF2',salt,iterations:310000,hash:'SHA-256'},
      keyMaterial,{name:'AES-GCM',length:256},false,['decrypt']
    );
    const decrypted=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ctWithTag);
    const html=new TextDecoder().decode(decrypted);

    // Inject into iframe
    const frame=document.getElementById('toolFrame');
    frame.style.display='block';
    document.getElementById('passwordScreen').style.display='none';
    document.body.style.padding='0';
    document.body.style.background='transparent';
    const blob=new Blob([html],{type:'text/html'});
    frame.src=URL.createObjectURL(blob);

  }catch(e){
    err.textContent='Incorrect password — please try again';
    err.classList.remove('hidden');
    btn.disabled=false;
    btn.innerHTML='Unlock';
    document.getElementById('pwInput').value='';
    document.getElementById('pwInput').focus();
  }
}
</script>
